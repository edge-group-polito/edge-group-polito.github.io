---
layout: default
hide_title: true
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <p class="byline">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %B %Y" }}</time>
    {% if page.author %} · {{ page.author }}{% endif %}
  </p>
  {{ content }}
</article>
<p><a href="{{ '/articles/' | relative_url }}">← All articles</a></p>
