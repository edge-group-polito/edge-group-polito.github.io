---
layout: default
title: Projects
---

<p class="lede">Public repositories from the
  <a href="https://github.com/{{ site.github_org }}">EDGE Group organization</a>, grouped by topic.</p>

<div id="repos"><p>Loading…</p></div>

<script>
// Topic -> section title comes from `topics:` in _config.yml. Edit it there, not here.
const TOPICS = {{ site.topics | jsonify }};
const ORG = {{ site.github_org | jsonify }};
const HIDE = {{ site.hide_topic | jsonify }};
const FALLBACK = "Other";

const el = document.getElementById("repos");
const esc = s => (s ?? "").replace(/[<>&"]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));

function group(repos) {
  const groups = new Map(Object.values(TOPICS).map(t => [t, []]));
  groups.set(FALLBACK, []);
  for (const r of repos) {
    if (r.name === ".github" || r.name.endsWith(".github.io")) continue;
    if (r.topics.includes(HIDE)) continue;   // explicit opt-out beats every rule below
    const hits = [...new Set(r.topics.map(t => TOPICS[t]).filter(Boolean))];
    // A fork is an upstream mirror until someone tags it — a topic means we work on it.
    // So tagging x-heep or cva6 is what pulls it onto the page.
    if (r.fork && !hits.length) continue;
    for (const g of (hits.length ? hits : [FALLBACK])) groups.get(g).push(r);
  }
  return [...groups].filter(([, rs]) => rs.length);
}

function card(r) {
  return `<div class="card">
    <a class="name" href="${esc(r.html_url)}">${esc(r.name)}</a>
    <p>${esc(r.description) || "<em>No description</em>"}</p>
    <div class="meta">
      ${r.language ? `<span>${esc(r.language)}</span>` : ""}
      <span>★ ${r.stargazers_count}</span>
      ${r.archived ? `<span class="tag">archived</span>` : ""}
      ${r.fork ? `<span class="tag">fork</span>` : ""}
    </div>
  </div>`;
}

fetch(`https://api.github.com/orgs/${ORG}/repos?per_page=100&sort=updated`)
  .then(r => r.ok ? r.json() : Promise.reject(r.status))
  .then(repos => {
    el.innerHTML = group(repos).map(([title, rs]) => `
      <h3>${esc(title)}</h3>
      <div class="grid">${rs.sort((a, b) => b.stargazers_count - a.stargazers_count)
                           .map(card).join("")}</div>`).join("")
      || "<p>No public repositories yet.</p>";
  })
  .catch(() => {
    el.innerHTML = `<p>Could not load repositories.
      See them on <a href="https://github.com/${ORG}">GitHub</a>.</p>`;
  });
</script>
